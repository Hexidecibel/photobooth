<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <link rel="stylesheet" href="/static/css/theme.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--pb-font-family);
            background: var(--pb-bg-primary);
            color: var(--pb-text-primary);
            min-height: 100vh;
        }

        .gallery-header {
            text-align: center;
            padding: 2rem 1rem 1rem;
            position: sticky;
            top: 0;
            background: var(--pb-bg-primary);
            z-index: 10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .gallery-header h1 {
            font-family: var(--pb-font-display);
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            margin-bottom: 0.25em;
        }

        .gallery-header p {
            color: var(--pb-text-secondary);
            font-size: var(--pb-font-size-body);
        }

        /* ── Masonry Layout ──────────────────────────────── */
        .masonry-grid {
            display: flex;
            gap: 8px;
            padding: 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .masonry-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .gallery-card {
            position: relative;
            overflow: hidden;
            border-radius: var(--pb-border-radius-sm);
            cursor: pointer;
            background: var(--pb-bg-card);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .gallery-card:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .gallery-card img {
            width: 100%;
            display: block;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-card img.loaded {
            opacity: 1;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: var(--pb-text-secondary);
            text-align: center;
        }
        .empty-state .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        .empty-state h3 {
            margin: 0 0 0.5rem;
            color: var(--pb-text-secondary);
        }
        .empty-state p {
            margin: 0;
            font-size: var(--pb-font-size-body);
        }

        /* ── Lightbox ────────────────────────────────────── */
        .lightbox-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1.5rem;
            padding: 1rem;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .lightbox-overlay.active {
            opacity: 1;
        }

        .lightbox-overlay img {
            max-width: 90vw;
            max-height: 75vh;
            object-fit: contain;
            border-radius: var(--pb-border-radius);
            box-shadow: var(--pb-shadow);
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: none;
            font-size: 2rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .lightbox-nav:hover { background: rgba(255,255,255,0.3); }
        .lightbox-nav.prev { left: 1rem; }
        .lightbox-nav.next { right: 1rem; }

        .lightbox-actions {
            display: flex;
            gap: 1rem;
        }

        .lightbox-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5em;
            padding: 0.75em 1.5em;
            border: none;
            border-radius: var(--pb-border-radius-sm);
            font-family: var(--pb-font-family);
            font-size: var(--pb-font-size-body);
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            text-decoration: none;
        }

        .lightbox-btn.download {
            background: var(--pb-accent);
            color: #fff;
        }

        .lightbox-btn.download:hover {
            background: var(--pb-accent-hover);
        }

        .lightbox-btn.close {
            background: var(--pb-bg-card);
            color: var(--pb-text-primary);
        }

        .lightbox-btn.close:hover {
            background: var(--pb-bg-secondary);
        }

        @media (max-width: 600px) {
            .masonry-grid {
                gap: 4px;
                padding: 0.5rem;
            }
            .masonry-column {
                gap: 4px;
            }
            .lightbox-nav { display: none; }
        }
    </style>
</head>
<body>
    <div class="gallery-header">
        <h1 id="event-name">Photo Gallery</h1>
        <p id="photo-count"></p>
    </div>

    <div id="gallery-grid"></div>

    <div class="empty-state" id="gallery-empty" style="display:none;">
        <div class="empty-icon">&#128247;</div>
        <h3>No photos yet</h3>
        <p>Be the first to take a photo!</p>
    </div>

    <script src="/static/js/gallery.js"></script>
</body>
</html>
